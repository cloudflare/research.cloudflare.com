# Cloudflare Research site — es-ES translation glossary.
#
# This file pins the terminology rules the translator must follow when
# producing the Castilian Spanish version of pages on this site. It
# is hashed into each translated file's cache key, so editing it
# invalidates es-ES translations on the next build (only es-ES —
# other locales are unaffected).
#
# Bump `version` whenever you make a meaningful edit so the cache
# invalidation is intentional and reviewable in version control.

version: "2026-05"

